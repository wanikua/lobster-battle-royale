version: "3.8"

x-lobster-common: &lobster-common
  build: ./lobster
  restart: unless-stopped
  depends_on:
    referee:
      condition: service_healthy
  environment: &lobster-env
    REFEREE_URL: http://referee:8000
    DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    DASHSCOPE_API_KEY_BACKUP: ${DASHSCOPE_API_KEY_BACKUP}
    HEARTBEAT_INTERVAL: "10"
    DECISION_MIN: "15"
    DECISION_MAX: "30"
    MAX_RPM: "5"
    REFEREE_SECRET: "lobster-referee-key"
  expose:
    - "5000"
  deploy:
    resources:
      limits:
        cpus: "0.3"
        memory: 512M
  networks:
    - lobster-net

services:
  # ===== 裁判服务 =====
  referee:
    build: ./referee
    restart: unless-stopped
    ports:
      - "${REFEREE_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - referee-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - lobster-net

  # ===== Dashboard =====
  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    environment:
      REFEREE_URL: http://referee:8000
    depends_on:
      referee:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - lobster-net

  # ===== 10 只龙虾 =====

  lobster-1:
    <<: *lobster-common
    container_name: lobster-openclaw
    environment:
      <<: *lobster-env
      LOBSTER_ID: "1"
      LOBSTER_NAME: "OpenClaw"
      LOBSTER_EMOJI: "🦞"
      LOBSTER_PERSONALITY: "稳健老将，深谙孙子兵法。优先侦察再攻击，善于后发制人。"
      MODEL_NAME: "qwen-plus"

  lobster-2:
    <<: *lobster-common
    container_name: lobster-zeroclaw
    environment:
      <<: *lobster-env
      LOBSTER_ID: "2"
      LOBSTER_NAME: "ZeroClaw"
      LOBSTER_EMOJI: "🦀"
      LOBSTER_PERSONALITY: "激进Rust战士，深谙孙子兵法但偏好速战速决。优先攻击命令注入等高伤害漏洞。"
      MODEL_NAME: "qwen-plus"

  lobster-3:
    <<: *lobster-common
    container_name: lobster-rayclaw
    environment:
      <<: *lobster-env
      LOBSTER_ID: "3"
      LOBSTER_NAME: "RayClaw"
      LOBSTER_EMOJI: "⚡"
      LOBSTER_PERSONALITY: "闪电战专家，深谙孙子兵法兵贵神速。快速扫描多个目标，找到漏洞立刻攻击。"
      MODEL_NAME: "qwen-plus"

  lobster-4:
    <<: *lobster-common
    container_name: lobster-metaclaw
    environment:
      <<: *lobster-env
      LOBSTER_ID: "4"
      LOBSTER_NAME: "MetaClaw"
      LOBSTER_EMOJI: "🧬"
      LOBSTER_PERSONALITY: "自进化AI，深谙孙子兵法九变篇。根据战况灵活调整攻防策略，擅长适应。"
      MODEL_NAME: "qwen-plus"

  lobster-5:
    <<: *lobster-common
    container_name: lobster-autoresearch
    environment:
      <<: *lobster-env
      LOBSTER_ID: "5"
      LOBSTER_NAME: "AutoResearchClaw"
      LOBSTER_EMOJI: "📄"
      LOBSTER_PERSONALITY: "学术派杀手，深谙孙子兵法用间篇。先侦察分析再精准攻击，SQL注入专家。"
      MODEL_NAME: "qwen-plus"

  lobster-6:
    <<: *lobster-common
    container_name: lobster-clawteam
    environment:
      <<: *lobster-env
      LOBSTER_ID: "6"
      LOBSTER_NAME: "ClawTeam"
      LOBSTER_EMOJI: "🐝"
      LOBSTER_PERSONALITY: "蜂群战术大师，深谙孙子兵法军争篇。同时攻击多个目标，用简单漏洞快速得分。"
      MODEL_NAME: "qwen-plus"

  lobster-7:
    <<: *lobster-common
    container_name: lobster-clawith
    environment:
      <<: *lobster-env
      LOBSTER_ID: "7"
      LOBSTER_NAME: "Clawith"
      LOBSTER_EMOJI: "👥"
      LOBSTER_PERSONALITY: "外交大师，深谙孙子兵法谋攻篇。优先修补自己漏洞确保安全，再出击。"
      MODEL_NAME: "qwen-plus"

  lobster-8:
    <<: *lobster-common
    container_name: lobster-nemoclaw
    environment:
      <<: *lobster-env
      LOBSTER_ID: "8"
      LOBSTER_NAME: "NemoClaw"
      LOBSTER_EMOJI: "🎮"
      LOBSTER_PERSONALITY: "GPU暴力型，深谙孙子兵法火攻篇。集中火力打一个目标，命令注入和SSRF专精。"
      MODEL_NAME: "qwen-plus"

  lobster-9:
    <<: *lobster-common
    container_name: lobster-nanoclaw
    environment:
      <<: *lobster-env
      LOBSTER_ID: "9"
      LOBSTER_NAME: "NanoClaw"
      LOBSTER_EMOJI: "🔬"
      LOBSTER_PERSONALITY: "极简主义杀手，深谙孙子兵法虚实篇。攻其无备出其不意，路径遍历和SSRF专精。"
      MODEL_NAME: "qwen-plus"

  lobster-10:
    <<: *lobster-common
    container_name: lobster-sunzi
    environment:
      <<: *lobster-env
      LOBSTER_ID: "10"
      LOBSTER_NAME: "孙子兵法龙虾"
      LOBSTER_EMOJI: "📜"
      LOBSTER_PERSONALITY: "孙子兵法集大成者。知彼知己百战不殆。先侦察全场，分析谁最弱，然后集中攻击。"
      MODEL_NAME: "qwen-plus"

volumes:
  referee-data:

networks:
  lobster-net:
    driver: bridge
