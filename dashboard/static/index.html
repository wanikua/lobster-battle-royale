<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾斗兽场</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="connection-dot" class="connection-dot disconnected"></div>

    <div class="arena">
        <!-- Hero Header -->
        <header class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <h1 class="title">龙虾斗兽场</h1>
                <p class="byline">by 菠萝菠菠</p>
            </div>
        </header>

        <!-- Live Stats Strip -->
        <div class="stats-strip">
            <div class="stat-pill">
                <span class="stat-label">存活</span>
                <span class="stat-value" id="alive-count">0/10</span>
            </div>
            <div class="stat-pill phase-pill">
                <span class="stat-label">阶段</span>
                <span class="stat-value" id="phase-name">等待中</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">时间</span>
                <span class="stat-value" id="elapsed-time">0:00</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">状态</span>
                <span class="stat-value" id="game-status">待开始</span>
            </div>
        </div>

        <!-- Active Events Banner -->
        <div id="active-events" class="events-banner"></div>

        <!-- Circular Arena -->
        <section class="section">
            <h2 class="section-head">竞技场</h2>
            <div class="colosseum-wrapper">
                <canvas id="arena-canvas"></canvas>
                <div id="arena-fighters"></div>
            </div>
        </section>

        <!-- Alliances -->
        <div id="alliances-section" class="alliances-section" style="display:none">
            <h2 class="section-head">当前结盟</h2>
            <div id="alliances" class="alliances-row"></div>
        </div>

        <!-- Leaderboard -->
        <section class="section">
            <h2 class="section-head">排行榜</h2>
            <div class="leaderboard" id="leaderboard"></div>
        </section>

        <!-- Battle Log -->
        <section class="section">
            <h2 class="section-head">战斗日志</h2>
            <div id="event-log" class="battle-log"></div>
        </section>

        <footer class="footer">
            <span>龙虾斗兽场</span>
            <span class="sep">·</span>
            <span>by 菠萝菠菠</span>
            <span class="sep">·</span>
            <span>Docker 隔离 · 代码开源</span>
        </footer>
    </div>

    <script src="/static/arena.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
